<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
user-scalable=no">

<title>30階層の魔王 Ver2.0</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- MENU -->

<div id="menuScene" class="scene">

<div class="menu-box">

<div class="menu-title">
30階層の魔王
</div>

<p>
勇者は30階層に潜む<br>
魔王討伐を目指す。
</p>

<button class="menu-btn"
onclick="startGame()">

ゲーム開始

</button>

<div class="version">
Ver2.0
</div>

</div>

</div>

<!-- GAME -->

<div id="gameScene" class="scene">

<div class="panel topbar">

<div id="floor">
1階層
</div>

</div>

<!-- BATTLE -->

<div class="panel battle-area">

<div class="character-box">

<div id="playerSprite"></div>

<div class="status-mini"
id="playerStats">
</div>

</div>

<div class="character-box">

<div id="enemySprite"></div>

<div class="status-mini">

<div class="enemy-name"
id="enemyName">
</div>

<div id="enemyStats"></div>

</div>

</div>

</div>

<!-- INFO -->

<div class="panel info-area">

<div class="info-box">

⚔ 装備<br><br>

<div id="equipment"></div>

</div>

<div class="info-box">

🎒 アイテム

<div class="inventory-list"
id="inventory">
</div>

</div>

</div>

<!-- LOG -->

<div class="panel log"
id="log">

ダンジョンへ潜入した。

</div>

<!-- BUTTON -->

<div class="bottom-area">

<button id="attackBtn"
onclick="attack()">

攻撃

</button>

<button id="itemBtn"
class="item-btn"
onclick="toggleItems()">

アイテム使用

</button>

<!-- ITEM -->

<div id="itemArea"
style="display:none;">

<button onclick="usePotion()">
回復薬
</button>

<button onclick="useBomb()">
爆薬
</button>

<button onclick="closeItemArea()">
戻る
</button>

</div>

<!-- CHOICE -->

<div id="choiceArea"
class="choice"
style="display:none;">
</div>

<!-- RESULT -->

<div id="resultArea"
style="display:none;">

<button class="menu-btn"
onclick="returnToMenu()">

メインメニューへ戻る

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
